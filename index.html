<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CURAE — Tu asistente de salud</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&family=Nunito:wght@400;600;700;800&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:          #F0EDE7;
  --surface:     #FAFAF8;
  --green:       #2E7D62;
  --green-light: #4A9E82;
  --green-pale:  #C4DDD5;
  --green-glow:  rgba(46,125,98,.20);
  --blue:        #3174B8;
  --blue-dark:   #1F5A9C;
  --blue-glow:   rgba(49,116,184,.22);
  --amber:       #B87430;
  --red:         #B84840;
  --red-dark:    #8E3028;
  --red-pale:    #F0DEDA;
  --red-glow:    rgba(184,72,64,.18);
  --text:        #1A2B24;
  --text-mid:    #486058;
  --text-soft:   #88A89E;
  --divider:     rgba(46,125,98,.10);
}

html, body { width: 100%; height: 100%; font-family: 'Nunito', sans-serif; -webkit-font-smoothing: antialiased; }

body {
  background:
    radial-gradient(ellipse 70% 50% at 25% 15%, rgba(46,125,98,.09) 0%, transparent 60%),
    radial-gradient(ellipse 60% 70% at 80% 90%, rgba(49,116,184,.06) 0%, transparent 55%),
    #E0DAD2;
}

.stage {
  width: 100%; min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  padding: 32px 16px;
}

.phone-frame {
  position: relative; flex-shrink: 0;
  width: 412px; height: 866px;
  border-radius: 54px;
  background: linear-gradient(155deg, #3A3A3C 0%, #1C1C1E 50%, #0F0F10 100%);
  box-shadow: 0 32px 72px rgba(0,0,0,.38), 0 10px 28px rgba(0,0,0,.22), 0 3px 8px rgba(0,0,0,.15), inset 0 1px 0 rgba(255,255,255,.10), inset 0 -1px 0 rgba(0,0,0,.25);
}
.phone-frame::before { content:''; position:absolute; inset:0; border-radius:54px; background:linear-gradient(130deg,rgba(255,255,255,.07) 0%,transparent 40%); pointer-events:none; z-index:30; }
.phone-frame::after  { content:''; position:absolute; right:-3px; top:150px; width:3px; height:64px; background:linear-gradient(180deg,#2C2C2E,#3A3A3C,#2C2C2E); border-radius:0 2px 2px 0; }

.btn-vol { position:absolute; left:-3px; width:3px; background:linear-gradient(180deg,#2C2C2E,#3A3A3C,#2C2C2E); border-radius:2px 0 0 2px; pointer-events:none; }
.btn-vol-1 { top:120px; height:30px; }
.btn-vol-2 { top:162px; height:54px; }
.btn-vol-3 { top:228px; height:54px; }

.phone-screen { position:absolute; top:11px; left:11px; right:11px; bottom:11px; border-radius:44px; overflow:hidden; background:var(--bg); box-shadow:inset 0 0 0 1px rgba(0,0,0,.12); }
.phone-notch  { position:absolute; top:12px; left:50%; transform:translateX(-50%); width:110px; height:32px; background:#111; border-radius:18px; z-index:100; pointer-events:none; }
.phone-notch::after { content:''; position:absolute; right:16px; top:50%; transform:translateY(-50%); width:9px; height:9px; border-radius:50%; background:#0A0A0C; }
.phone-home   { position:absolute; bottom:9px; left:50%; transform:translateX(-50%); width:118px; height:5px; background:rgba(30,43,36,.16); border-radius:3px; z-index:100; pointer-events:none; }

.app-inner {
  position:absolute; inset:0; overflow:hidden;
  background:
    radial-gradient(ellipse 85% 50% at 15% 0%, rgba(46,125,98,.09) 0%, transparent 60%),
    radial-gradient(ellipse 65% 70% at 88% 100%, rgba(49,116,184,.06) 0%, transparent 55%),
    var(--bg);
}

.screen {
  position:absolute; inset:0;
  display:flex; flex-direction:column; align-items:center;
  padding:0 28px;
  justify-content:space-between;
  padding-top: clamp(52px,7vh,68px);
  padding-bottom: clamp(28px,4vh,44px);
  z-index:2;
}

/* HEADER */
.header { text-align:center; }
.bracelet-row { display:inline-flex; align-items:center; gap:7px; margin-bottom:14px; background:rgba(255,255,255,.55); border:1px solid var(--divider); border-radius:20px; padding:5px 12px 5px 8px; }
.b-dot { position:relative; width:10px; height:10px; border-radius:50%; background:#28A870; animation:bpulse 2.5s ease-out infinite; flex-shrink:0; transition:background .4s; }
.b-dot::before { content:''; position:absolute; inset:-4px; border-radius:50%; background:rgba(40,168,112,.18); animation:bring 2.5s ease-out infinite; }
.b-dot.off { background:var(--red); animation:bpulse-red 2.5s ease-out infinite; }
.b-dot.off::before { background:rgba(184,72,64,.18); animation:bring-red 2.5s ease-out infinite; }
@keyframes bpulse { 0%,70%,100%{box-shadow:0 0 0 0 rgba(40,168,112,.4)} 35%{box-shadow:0 0 0 6px rgba(40,168,112,.0)} }
@keyframes bring  { 0%,60%,100%{transform:scale(1);opacity:1} 30%{transform:scale(1.6);opacity:0} }
@keyframes bpulse-red { 0%,70%,100%{box-shadow:0 0 0 0 rgba(184,72,64,.4)} 35%{box-shadow:0 0 0 6px rgba(184,72,64,.0)} }
@keyframes bring-red  { 0%,60%,100%{transform:scale(1);opacity:1} 30%{transform:scale(1.6);opacity:0} }
.b-label { font-size:11px; color:var(--text-mid); font-weight:700; letter-spacing:.5px; white-space:nowrap; }
.brand { font-family:'Lora',serif; font-size:26px; font-weight:500; color:var(--green); letter-spacing:5px; text-transform:uppercase; }
.brand-sub { font-size:12px; color:var(--text-soft); letter-spacing:1.4px; margin-top:3px; font-weight:600; }

/* CLOCK */
.clock-block { text-align:center; }
.clock { font-family:'Lora',serif; font-size:72px; font-weight:400; color:var(--text); line-height:1; letter-spacing:-2px; }
.date-lbl { font-size:12px; color:var(--text-soft); font-weight:600; margin-top:6px; text-transform:capitalize; letter-spacing:.3px; opacity:.85; }

/* RESPONSE DISPLAY — reemplaza el saludo en pantalla */
.response-display {
  text-align:center;
  min-height:100px;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:8px;
  width:100%;
  transition:all .4s ease;
}

/* Estado normal: saludo */
.response-display .resp-greeting {
  font-family:'Lora',serif;
  font-size:18px; color:var(--text-mid);
  font-weight:400; line-height:1.5;
  font-style:italic;
  transition:opacity .35s;
}
.response-display .resp-greeting em { color:var(--green-light); }

/* Estado respondiendo: texto de respuesta */
.resp-tag {
  font-size:11px; font-weight:800; letter-spacing:1.5px;
  text-transform:uppercase; opacity:.7;
  display:none;
}
.resp-main {
  font-family:'Lora',serif;
  font-size:17px; line-height:1.55;
  font-weight:400; font-style:italic;
  display:none;
}

/* Tarjeta de presión arterial */
.resp-presion {
  display:none;
  flex-direction:column; align-items:center;
  gap:6px; width:100%;
}
.presion-valor {
  font-family:'Lora',serif;
  font-size:42px; font-weight:400;
  line-height:1; letter-spacing:-1px;
}
.presion-estado {
  font-size:13px; font-weight:800;
  letter-spacing:1px; text-transform:uppercase;
  padding:4px 14px; border-radius:20px;
}
.presion-instrucciones {
  font-size:13px; color:var(--text-mid);
  line-height:1.6; text-align:center;
  margin-top:4px;
}
.presion-tity {
  font-size:12px; font-weight:700;
  margin-top:4px; opacity:.8;
}

/* Colores por estado */
.estado-normal .presion-valor { color:var(--green); }
.estado-normal .presion-estado { background:rgba(46,125,98,.12); color:var(--green); }
.estado-alta .presion-valor { color:var(--red); }
.estado-alta .presion-estado { background:rgba(184,72,64,.12); color:var(--red); }
.estado-baja .presion-valor { color:var(--amber); }
.estado-baja .presion-estado { background:rgba(184,116,48,.12); color:var(--amber); }

/* Tarjeta hora/fecha */
.resp-datetime {
  display:none;
  flex-direction:column; align-items:center; gap:4px;
}
.datetime-icon { font-size:28px; line-height:1; }
.datetime-valor {
  font-family:'Lora',serif;
  font-size:32px; font-weight:400;
  color:var(--text); letter-spacing:-1px;
}
.datetime-sub { font-size:13px; color:var(--text-soft); font-weight:600; text-transform:capitalize; }

/* MIC AREA */
.mic-area { display:flex; flex-direction:column; align-items:center; gap:18px; }

.mic-rings { position:relative; width:210px; height:210px; display:flex; align-items:center; justify-content:center; }
.ring { position:absolute; border-radius:50%; border:1.5px solid var(--green-glow); opacity:0; pointer-events:none; }
.ring-1 { inset:-16px; } .ring-2 { inset:-32px; } .ring-3 { inset:-50px; }
.is-listening .ring { border-color:var(--blue-glow); }
.is-listening .ring-1 { animation:rpulse 2s ease-out infinite; }
.is-listening .ring-2 { animation:rpulse 2s .45s ease-out infinite; }
.is-listening .ring-3 { animation:rpulse 2s .9s ease-out infinite; }
@keyframes rpulse { 0%{opacity:.70;transform:scale(.93)} 100%{opacity:0;transform:scale(1.25)} }

.mic-btn {
  width:100%; height:100%; border-radius:50%; border:none; cursor:pointer;
  background:linear-gradient(145deg,#3D9478 0%,#237058 100%);
  box-shadow:0 12px 44px rgba(46,125,98,.32),0 4px 12px rgba(46,125,98,.20),inset 0 2px 0 rgba(255,255,255,.22),inset 0 -2px 0 rgba(0,0,0,.10);
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px;
  transition:transform .22s cubic-bezier(.34,1.56,.64,1), background .35s ease, box-shadow .35s ease;
  -webkit-tap-highlight-color:transparent; user-select:none; position:relative; z-index:1;
}
.mic-btn:active { transform:scale(.92); }
.mic-btn.s-listening { background:linear-gradient(145deg,#4892D0 0%,#1F5FA8 100%); box-shadow:0 12px 48px rgba(49,116,184,.40),0 4px 14px rgba(49,116,184,.28),inset 0 2px 0 rgba(255,255,255,.22); animation:breathe-blue 1.8s ease-in-out infinite; }
.mic-btn.s-processing { background:linear-gradient(145deg,#D49040 0%,#9E6018 100%); }
.mic-btn.s-responding { background:linear-gradient(145deg,#5090C8 0%,#2460A0 100%); }
.mic-btn.s-error      { background:linear-gradient(145deg,#CC6058 0%,#922E28 100%); }
@keyframes breathe-blue { 0%,100%{transform:scale(1)} 50%{transform:scale(1.05)} }

.mic-icon { width:46px; height:46px; stroke:rgba(255,255,255,.96); fill:none; stroke-width:2.0; stroke-linecap:round; stroke-linejoin:round; }
.mic-btn.s-processing .mic-icon, .mic-btn.s-responding .mic-icon { display:none; }
.mic-lbl { font-size:14px; font-weight:800; color:rgba(255,255,255,.92); letter-spacing:3.5px; text-transform:uppercase; }
.mic-btn.s-processing .mic-lbl, .mic-btn.s-responding .mic-lbl { display:none; }

.proc-dots { display:none; align-items:center; gap:8px; }
.mic-btn.s-processing .proc-dots { display:flex; }
.pd { width:10px; height:10px; border-radius:50%; background:rgba(255,255,255,.92); animation:pdot 1s ease-in-out infinite; }
.pd:nth-child(2){animation-delay:.2s} .pd:nth-child(3){animation-delay:.4s}
@keyframes pdot { 0%,100%{transform:scale(.45);opacity:.3} 50%{transform:scale(1);opacity:1} }

.wave-bars { display:none; align-items:center; gap:5px; height:28px; }
.mic-btn.s-responding .wave-bars { display:flex; }
.wb { width:4px; border-radius:2px; background:rgba(255,255,255,.90); }
.mic-btn.s-responding .wb { animation:wbar .5s ease-in-out infinite alternate; }
.wb:nth-child(1){height:8px;animation-delay:.00s} .wb:nth-child(2){height:18px;animation-delay:.12s} .wb:nth-child(3){height:26px;animation-delay:.24s} .wb:nth-child(4){height:18px;animation-delay:.12s} .wb:nth-child(5){height:8px;animation-delay:.00s}
@keyframes wbar { from{transform:scaleY(.28);opacity:.50} to{transform:scaleY(1);opacity:1} }

.mic-hint { font-size:13px; color:var(--text-soft); font-weight:600; letter-spacing:.4px; min-height:20px; }

/* SOS */
.sos-btn {
  display:flex; align-items:center; justify-content:center; gap:10px;
  background:var(--red); border:none; border-radius:18px; padding:15px 32px; cursor:pointer;
  box-shadow:0 6px 20px rgba(184,72,64,.28),0 2px 6px rgba(184,72,64,.18),inset 0 1px 0 rgba(255,255,255,.14);
  transition:transform .18s ease, box-shadow .18s ease; -webkit-tap-highlight-color:transparent;
  width:100%; max-width:280px;
}
.sos-btn:active { transform:scale(.96); }
.sos-icon-wrap { width:22px; height:22px; display:flex; align-items:center; justify-content:center; }
.sos-icon-wrap svg { width:22px; height:22px; stroke:rgba(255,255,255,.96); fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }
.sos-txt { font-size:15px; font-weight:800; color:rgba(255,255,255,.96); letter-spacing:2px; text-transform:uppercase; }

/* NO SPEECH */
.no-speech { display:none; position:absolute; top:56px; left:0; right:0; z-index:80; background:var(--red-pale); padding:10px 20px; text-align:center; font-size:13px; color:var(--red); font-weight:700; }
.no-speech.show { display:block; }

/* RESPONSIVE */
@media (max-width:480px) {
  body { background:var(--bg); }
  .stage { padding:0; min-height:100dvh; align-items:stretch; }
  .phone-frame { width:100%; height:100dvh; border-radius:0; background:none; box-shadow:none; }
  .phone-frame::before, .phone-frame::after { display:none; }
  .btn-vol { display:none; }
  .phone-screen { top:0; left:0; right:0; bottom:0; border-radius:0; }
  .phone-notch, .phone-home { display:none; }
  .screen { padding-top:clamp(36px,7vh,56px); padding-bottom:clamp(24px,4vh,40px); }
}
@media (max-height:820px) and (min-width:481px) { .phone-frame { transform-origin:top center; transform:scale(0.88); } .stage { align-items:flex-start; padding-top:20px; } }
@media (max-height:680px) and (min-width:481px) { .phone-frame { transform:scale(0.74); } }
</style>
</head>
<body>

<div class="stage">
  <div class="phone-frame">
    <div class="btn-vol btn-vol-1"></div>
    <div class="btn-vol btn-vol-2"></div>
    <div class="btn-vol btn-vol-3"></div>
    <div class="phone-screen">
      <div class="phone-notch"></div>
      <div class="phone-home"></div>
      <div class="app-inner">
        <div class="screen">

          <header class="header">
            <div class="bracelet-row">
              <div class="b-dot" id="bDot"></div>
              <span class="b-label" id="bLabel">brazalete activo</span>
            </div>
            <div class="brand">CURAE</div>
            <div class="brand-sub">Tu asistente de salud</div>
          </header>

          <div class="clock-block">
            <div class="clock"    id="clock">--:--</div>
            <div class="date-lbl" id="dateLbl">cargando…</div>
          </div>

          <!-- ZONA DE RESPUESTA — reemplaza ventanita -->
          <div class="response-display" id="responseDisplay">

            <!-- Saludo por defecto -->
            <div class="resp-greeting" id="respGreeting">
              Hola, Nona.<br><em>Estoy aquí contigo.</em>
            </div>

            <!-- Respuesta texto simple -->
            <div class="resp-tag"  id="respTag"></div>
            <div class="resp-main" id="respMain"></div>

            <!-- Tarjeta presión arterial -->
            <div class="resp-presion" id="respPresion">
              <div class="presion-valor"  id="presionValor">120/80</div>
              <div class="presion-estado" id="presionEstado">✅ Normal</div>
              <div class="presion-instrucciones" id="presionInstrucciones"></div>
              <div class="presion-tity"   id="presionTity"></div>
            </div>

            <!-- Tarjeta hora/fecha -->
            <div class="resp-datetime" id="respDatetime">
              <div class="datetime-icon"  id="datetimeIcon">🕐</div>
              <div class="datetime-valor" id="datetimeValor"></div>
              <div class="datetime-sub"   id="datetimeSub"></div>
            </div>

          </div>

          <!-- BOTÓN MIC -->
          <div class="mic-area">
            <div class="mic-rings" id="micRings">
              <div class="ring ring-1"></div>
              <div class="ring ring-2"></div>
              <div class="ring ring-3"></div>
              <button class="mic-btn" id="micBtn" onclick="onMicPress()" aria-label="Hablar con CURAE">
                <svg class="mic-icon" viewBox="0 0 24 24">
                  <rect x="9" y="2" width="6" height="12" rx="3"/>
                  <path d="M19 10v2a7 7 0 01-14 0v-2"/>
                  <line x1="12" y1="19" x2="12" y2="23"/>
                  <line x1="8"  y1="23" x2="16" y2="23"/>
                </svg>
                <div class="proc-dots">
                  <div class="pd"></div><div class="pd"></div><div class="pd"></div>
                </div>
                <div class="wave-bars">
                  <div class="wb"></div><div class="wb"></div><div class="wb"></div>
                  <div class="wb"></div><div class="wb"></div>
                </div>
                <span class="mic-lbl" id="micLbl">HABLA</span>
              </button>
            </div>
            <div class="mic-hint" id="micHint">Presiona y habla</div>
          </div>

          <button class="sos-btn" onclick="onSOS()" aria-label="Emergencia">
            <div class="sos-icon-wrap">
              <svg viewBox="0 0 24 24">
                <path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/>
                <path d="M13.73 21a2 2 0 01-3.46 0"/>
              </svg>
            </div>
            <span class="sos-txt">Emergencia</span>
          </button>
          <p style="text-align:center; font-size:11px; color:#999; margin-top:8px;">© Alejandra Arroyo</p>

        </div><!-- /screen -->

        <div class="no-speech" id="noSpeech">
          Tu navegador no soporta reconocimiento de voz. Por favor usa Chrome.
        </div>

      </div><!-- /app-inner -->
    </div><!-- /phone-screen -->
  </div><!-- /phone-frame -->
</div><!-- /stage -->

<script>
/* ─── RELOJ ─── */
(function tick() {
  const n  = new Date();
  const hh = String(n.getHours()).padStart(2,'0');
  const mm = String(n.getMinutes()).padStart(2,'0');
  document.getElementById('clock').textContent = hh + ':' + mm;
  const D = ['domingo','lunes','martes','miércoles','jueves','viernes','sábado'];
  const M = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  document.getElementById('dateLbl').textContent = D[n.getDay()] + ', ' + n.getDate() + ' de ' + M[n.getMonth()];
  setTimeout(tick, 1000);
})();

/* ─── BRAZALETE ─── */
function setBracelet(on) {
  document.getElementById('bDot').className     = 'b-dot' + (on ? '' : ' off');
  document.getElementById('bLabel').textContent = on ? 'brazalete activo' : 'brazalete desconectado';
}
setBracelet(true);

/* ─── CONTEXTO (detectar si dijo malestar antes) ─── */
let lastMalestar = false;
let malestarTipo = 'ninguno'; // 'ninguno' | 'alta' | 'baja'

/* ─── INTENCIONES ─── */
const INTENTS = [
  { id:'saludo', keys:['hola','buenos días','buenos dias','buenas tardes','buenas noches','buenas','qué tal','que tal','cómo estás','como estas'],
    audio:'audio_isaludo_inicial.mp3', text:'Hola Nona, estoy aquí para ayudarte. ¿Qué necesitas?', tag:'👋 Hola Nona' },
  { id:'gracias', keys:['gracias','muchas gracias','te lo agradezco','muy amable'],
    audio:'audio_gracias.mp3', text:'De nada Nona, para eso estoy aquí contigo. Cuídate mucho.', tag:'🤗 Con gusto' },
  { id:'bien', keys:['estoy bien','me siento bien','todo bien','muy bien','bien gracias'],
    audio:'audio_bien.mp3', text:'Me alegra mucho escuchar eso Nona.', tag:'😊 Qué bueno' },
  { id:'hora', keys:['qué hora','que hora','hora es','qué hora es','dime la hora','que hora es'],
    audio:null, dynamic:'hora', text:'', tag:'🕐 La hora' },
  { id:'fecha', keys:['qué día','que dia','hoy es','qué fecha','que fecha','día es hoy','qué día es','fecha de hoy','que dia es hoy'],
    audio:'audio_fecha.mp3', dynamic:'fecha', text:'', tag:'📅 Fecha de hoy' },
  { id:'recordatorio', keys:['tomé','tome','ya tomé','ya tome','ya lo tomé','ya me lo tomé'],
    audio:'audio_recordatorio.mp3', text:'No hay registro de que hayas tomado tu medicamento hoy. Recuerda tomarlo con agua.', tag:'✅ Recordatorio' },
  { id:'medicamento', keys:['medicamento','pastilla','losartán','losartan','medicina','pildora','píldora','qué debo tomar','que debo tomar','remedio','remedios'],
    audio:'audio_medicamento.mp3', text:'Recuerda la Memantina de 5mg ahora en la mañana con bastante agua.', tag:'💊 Medicamento' },
  { id:'agendar', keys:['agendar','quiero una cita','necesito cita','pedir cita','reservar hora','quiero ver al doctor','necesito ir al médico','quiero ir al doctor'],
    audio:'audio_cita_wa.mp3', text:'Voy a contactar a la agenda médica ahora mismo.', tag:'📅 Agendar cita',
    whatsapp:'56975493852', whatsappMsg:'Hola, quisiera agendar una cita médica para mi mamá Nona. ¿Tienen disponibilidad esta semana?' },
  { id:'cita', keys:['cita','hora médica','médico','doctor','consulta','turno','próxima cita','cuándo es mi cita','cuando es mi cita'],
    audio:'audio_cita.mp3', text:'Tu próxima cita es el 10 de abril a las 10 de la mañana, en el centro médico.', tag:'📅 Próxima cita' },

function matchIntent(q) {
  const s = q.toLowerCase();
  for (const i of INTENTS) { if (i.keys.some(k => s.includes(k))) return i; }
  return null;
}

/* ─── MOSTRAR RESPUESTA EN PANTALLA (sin ventanita) ─── */
function showInScreen(type, data) {
  // Ocultar todo
  document.getElementById('respGreeting').style.display    = 'none';
  document.getElementById('respTag').style.display         = 'none';
  document.getElementById('respMain').style.display        = 'none';
  document.getElementById('respPresion').style.display     = 'none';
  document.getElementById('respDatetime').style.display    = 'none';

  if (type === 'greeting') {
    document.getElementById('respGreeting').style.display = 'block';

  } else if (type === 'text') {
    document.getElementById('respTag').textContent  = data.tag;
    document.getElementById('respMain').textContent = data.text;
    document.getElementById('respTag').style.display  = 'block';
    document.getElementById('respMain').style.display = 'block';

  } else if (type === 'presion') {
    const el = document.getElementById('respPresion');
    el.className = 'resp-presion estado-' + data.estado;
    document.getElementById('presionValor').textContent       = data.valor;
    document.getElementById('presionEstado').textContent      = data.estadoTexto;
    document.getElementById('presionInstrucciones').innerHTML = data.instrucciones;
    document.getElementById('presionTity').textContent        = data.tity || '';
    el.style.display = 'flex';

  } else if (type === 'datetime') {
    document.getElementById('datetimeIcon').textContent  = data.icon;
    document.getElementById('datetimeValor').textContent = data.valor;
    document.getElementById('datetimeSub').textContent   = data.sub || '';
    document.getElementById('respDatetime').style.display = 'flex';
  }
}

/* ─── ESTADO ─── */
let STATE     = 'idle';
let resetTimer = null;

const micBtn   = document.getElementById('micBtn');
const micRings = document.getElementById('micRings');
const micLbl   = document.getElementById('micLbl');
const micHint  = document.getElementById('micHint');

const CFG = {
  idle:       { lbl:'HABLA',  hint:'Presiona y habla'      },
  listening:  { lbl:'OYE',    hint:'Habla con calma, Nona' },
  processing: { lbl:'',       hint:''                       },
  responding: { lbl:'',       hint:'Presiona para parar'   },
  error:      { lbl:'!',      hint:'Inténtalo de nuevo'    }
};

function setState(s) {
  STATE = s;
  micBtn.className    = 'mic-btn' + (s !== 'idle' ? ' s-' + s : '');
  micRings.className  = 'mic-rings' + (s === 'listening' ? ' is-listening' : '');
  micLbl.textContent  = CFG[s] ? CFG[s].lbl  : '';
  micHint.textContent = CFG[s] ? CFG[s].hint : '';
  if (s === 'error') setTimeout(() => setState('idle'), 3000);
  if (s === 'idle')  showInScreen('greeting');
}

/* ─── VOZ ─── */
let recog = null;
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
if (SR) {
  recog = new SR();
  recog.lang = 'es-CL'; recog.continuous = false; recog.interimResults = false;
  recog.onresult = e => {
    const t = Array.from(e.results).map(r => r[0].transcript).join(' ').toLowerCase().trim();
    handleQuery(t);
  };
  recog.onerror = e => {
    if (e.error === 'not-allowed') { showInScreen('text',{tag:'🎤',text:'Necesito acceso al micrófono. Revisa los permisos.'}); }
    setState('idle');
  };
  recog.onend = () => { if (STATE === 'listening') setState('idle'); };
} else {
  document.getElementById('noSpeech').classList.add('show');
}

function onMicPress() {
  if (resetTimer) { clearTimeout(resetTimer); resetTimer = null; }
  if (STATE === 'responding') { stopAudio(); setState('idle'); return; }
  if (STATE === 'listening')  { recog && recog.stop(); setState('idle'); return; }
  if (STATE === 'processing') return;
  if (!recog) { showInScreen('text',{tag:'⚠️',text:'Usa Chrome para activar la voz.'}); return; }
  try { recog.start(); setState('listening'); } catch(e) { setState('idle'); }
}

function handleQuery(q) {
  setState('processing');
  setTimeout(() => {
    const intent = matchIntent(q);
    if (!intent) {
      showInScreen('text', { tag:'🤝 Estoy aquí', text:'No te entendí bien, Nona. ¿Puedes repetirlo con calma?' });
      setState('responding');
      playAudio(null, 'No te entendí bien Nona. ¿Puedes repetirlo con calma?');
      autoReset(6000);
      return;
    }

    /* guardar contexto de malestar */
    if (intent.malestarTipo) {
      lastMalestar = true;
      malestarTipo = intent.malestarTipo;
    }

    /* WhatsApp automático */
    if (intent.whatsapp) {
      const msg = encodeURIComponent(intent.whatsappMsg);
      setTimeout(() => window.open('https://wa.me/' + intent.whatsapp + '?text=' + msg, '_blank'), 2500);
    }

    /* MEDICAMENTO DINÁMICO según hora */
    if (intent.dynamic === 'medicamento') {
      const hora = new Date().getHours();
      let texto, audioFile;
      if (hora >= 5 && hora < 14) {
        texto = 'Nona, ahora a las 9 de la mañana corresponde tu Memantina de 5mg. Tómala con el desayuno.';
        audioFile = 'audio_medicamento.mp3';
      } else {
        texto = 'Nona, ahora a las 8 de la noche corresponde tu Memantina de 5mg. Tómala antes de dormir.';
        audioFile = 'audio_medicamento_noche.mp3';
      }
      showInScreen('text', { tag:'💊 Medicamento', text: texto });
      setState('responding');
      playAudio(audioFile, texto);
      autoReset(8000);
      return;
    }

    /* PRESIÓN DINÁMICA */
    if (intent.dynamic === 'presion') {
      let estado, valor, estadoTexto, instrucciones, tityMsg, audioFile;
      if (malestarTipo === 'alta') {
        estado='alta'; valor='140/90'; estadoTexto='⚠️ Presión elevada';
        instrucciones='1. Siéntate con calma<br>2. Respira despacio<br>3. No te muevas bruscamente';
        tityMsg='👩 Avisando a Tity…';
        audioFile='audio_presion_alta.mp3';
        /* WhatsApp a Tity */
        const msg = encodeURIComponent('⚠️ Tity, la presión de Nona está elevada (140/90). Por favor contáctala.');
        setTimeout(() => window.open('https://wa.me/56951573933?text=' + msg, '_blank'), 3000);
      } else if (malestarTipo === 'baja') {
        estado='baja'; valor='90/60'; estadoTexto='⚠️ Presión baja';
        instrucciones='1. Acuéstate boca arriba<br>2. Levanta las piernas<br>3. Toma agua con sal';
        tityMsg='👩 Avisando a Tity…';
        audioFile='audio_presion_baja.mp3';
        const msg = encodeURIComponent('⚠️ Tity, la presión de Nona está baja (90/60). Por favor contáctala.');
        setTimeout(() => window.open('https://wa.me/56951573933?text=' + msg, '_blank'), 3000);
      } else {
        estado='normal'; valor='120/80'; estadoTexto='✅ Todo normal';
        instrucciones=''; tityMsg='';
        audioFile='audio_presion_normal.mp3';
      }
      showInScreen('presion', { estado, valor, estadoTexto, instrucciones, tity: tityMsg });
      setState('responding');
      playAudio(audioFile, 'Tu presión es ' + valor + '. ' + (estado==='normal' ? 'Todo está bien Nona.' : 'Estoy avisando a Tity.'));
      autoReset(10000);
      return;
    }

    /* HORA DINÁMICA */
    if (intent.dynamic === 'hora') {
      const n = new Date();
      const hh = String(n.getHours()).padStart(2,'0');
      const mm = String(n.getMinutes()).padStart(2,'0');
      const texto = 'Son las ' + hh + ':' + mm;
      showInScreen('datetime', { icon:'🕐', valor: hh + ':' + mm, sub: texto });
      setState('responding');
      playAudio(null, texto + '.');
      autoReset(6000);
      return;
    }

    /* FECHA DINÁMICA */
    if (intent.dynamic === 'fecha') {
      const n = new Date();
      const D = ['domingo','lunes','martes','miércoles','jueves','viernes','sábado'];
      const M = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
      const dia  = D[n.getDay()];
      const fecha = n.getDate() + ' de ' + M[n.getMonth()];
      showInScreen('datetime', { icon:'📅', valor: dia, sub: fecha + ' de ' + n.getFullYear() });
      setState('responding');
      playAudio(intent.audio, 'Hoy es ' + dia + ' ' + fecha + ' de ' + n.getFullYear());
      autoReset(7000);
      return;
    }

    /* RESPUESTA NORMAL */
    showInScreen('text', { tag: intent.tag, text: intent.text });
    setState('responding');
    playAudio(intent.audio, intent.text);
    autoReset(8000);

  }, 900);
}

/* Auto-reset a idle después de mostrar respuesta */
function autoReset(ms) {
  if (resetTimer) clearTimeout(resetTimer);
  resetTimer = setTimeout(() => {
    stopAudio();
    setState('idle');
    resetTimer = null;
  }, ms);
}

/* SOS */
function onSOS() {
  const em = INTENTS.find(i => i.id === 'emergencia');
  showInScreen('text', { tag: em.tag, text: em.text });
  setState('responding');
  playAudio(em.audio, em.text);
  /* Llamada telefónica directa a Tity */
  window.location.href = 'tel:+56956026895';
  autoReset(10000);
}

/* ─── AUDIO ─── */
let curAudio = null;
function playAudio(file, fallback) {
  stopAudio();
  if (file) {
    const a = new Audio(file); curAudio = a;
    a.addEventListener('ended', () => { curAudio = null; });
    a.addEventListener('error', () => { curAudio = null; });
    a.play().catch(() => {});
  }
}
function stopAudio() {
  if (curAudio) { curAudio.pause(); curAudio.currentTime = 0; curAudio = null; }
  if (window.speechSynthesis) speechSynthesis.cancel();
}

/* Init */
showInScreen('greeting');
</script>
